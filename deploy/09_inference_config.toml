# ============================================================
# Phase 9 — Inference Integration Configuration
# Connects the Vertex AI endpoint back to the Omniverse viewer
# ============================================================

[vertex_ai]
# GCP project and region where the endpoint was deployed
project_id  = "hmth391"
region      = "us-central1"

# Vertex AI endpoint ID — fill in after running 08_vertex_training.py
# Format: projects/<NUM>/locations/<REGION>/endpoints/<ENDPOINT_ID>
endpoint_id = ""

# Auth: uses Application Default Credentials (gcloud auth application-default login)
# No key file needed when running on GCP Compute Engine or Vertex AI

# ── Polling ────────────────────────────────────────────────
[polling]
# How often (seconds) to pull fresh sensor readings and call the endpoint
interval_seconds = 60

# Maximum number of racks to score per polling cycle (rate-limit guard)
max_racks_per_batch = 48

# ── Alert thresholds ───────────────────────────────────────
[thresholds]
# Failure probability above which an alert is raised per horizon
alert_1h  = 0.70   # 70% probability of failure in next 1 hour
alert_6h  = 0.55   # 55% probability of failure in next 6 hours
alert_24h = 0.40   # 40% probability of failure in next 24 hours

# ── Rack ID mapping ────────────────────────────────────────
# Maps sensor rack_id integers (0-47) to USD prim paths in the DataHall stage.
#
# ACTUAL prim structure discovered from DataHall_Full_01.usd:
#   defaultPrim = "World"
#   Racks live under /World/ as Xform prims named w_42U_01, w_42U_02, ...
#   (instanceable = true, each pointing to Rack_42U_inst.usd)
#
# The template below maps rack_id → /World/w_42U_{rack_id+1:02d}
# e.g. rack_id=0  → /World/w_42U_01
#      rack_id=47 → /World/w_42U_48
[rack_mapping]
prim_path_template = "/World/w_42U_{rack_num:02d}"

# rack_num = rack_id + 1  (USD naming starts at 01, sensor IDs start at 0)
rack_id_offset = 1

# ── Omniverse connection ───────────────────────────────────
[omniverse]
# Kit streaming host — use the GPU VM external IP from Phase 5b
# Run: gcloud compute instances describe datacenter-kit-vm --zone=us-central1-a \
#        --format="get(networkInterfaces[0].accessConfigs[0].natIP)"
kit_host = "localhost"

# Kit WebSocket script API port (built into Kit 104+, no extension needed)
kit_port = 8012

# Custom USD attribute written on each rack prim to store failure probability
# e.g. /World/w_42U_01 gets attribute "datacenter:failureProb_1h" = 0.83
failure_attr_prefix = "datacenter:failureProb"

# When true, racks above alert threshold also get "datacenter:alertActive" = true
# A Kit material override can read this to turn racks red in the viewer
enable_alert_attribute = true

# ── Logging ────────────────────────────────────────────────
[logging]
level     = "INFO"
log_file  = "/var/log/datacenter_inference.log"
rotate_mb = 50
keep_logs = 5

# ── Authentication ─────────────────────────────────────────
[auth]
# Set to true when the Cloud Run endpoint requires IAM Bearer token auth
# (i.e. when deployed with --no-allow-unauthenticated in Phase 5)
# Set to false for local dev / testing without IAM tokens
enabled = false

# ── GCS data ───────────────────────────────────────────────
[data]
# Live telemetry bucket — real sensor readings from Jetson Nano edge devices.
# Scholars write their telemetry pipelines to land data here.
# Format expected: CSV with columns [timestamp, rack_id, temp_c, power_kw, disk_health, cpu_load]
live_sensor_gcs   = "gs://hmth391-telemetry-ingest"

# Fallback: synthetic CSV generated by Phase 6 (used before live telemetry is available)
synthetic_sensor_gcs = "gs://hmth391-omniverse-assets/training-data/sensor_timeseries.csv"

# Window size must match the model's WINDOW_SIZE (12 steps = 60 min at 5-min intervals)
window_size       = 12
sample_interval_s = 300

# Feature columns expected by the model (must match 07_world_model.py FEATURE_COLS)
# If you added Phase D feature engineering (18 features), update this list.
feature_columns   = ["temp_c", "power_kw", "disk_health", "cpu_load"]

# ── Edge deployment ────────────────────────────────────────
[edge]
# Artifact Registry path for World Model + DINO encoder weights.
# Jetson Nano devices pull inference containers from here.
# Provisioned by Nolan Code for the Scholars Program.
registry          = "us-central1-docker.pkg.dev/hmth391/world-model-repo"
inference_image   = "us-central1-docker.pkg.dev/hmth391/world-model-repo/datacenter-inference:latest"
dino_image        = "us-central1-docker.pkg.dev/hmth391/world-model-repo/dino-encoder:latest"

# GCS path where ONNX/TensorRT edge model files are stored for Jetson pull
edge_model_gcs    = "gs://hmth391-omniverse-assets/models/edge"
